<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#f5f6f8"/>

  <!-- Clock ring -->
  <circle cx="16" cy="16" r="10.5" fill="none" stroke="#2563eb" stroke-width="1.8"/>

  <!-- Tick marks at 12, 3, 6, 9 -->
  <line x1="16" y1="6.5" x2="16" y2="8.5" stroke="#2563eb" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="25.5" y1="16" x2="23.5" y2="16" stroke="#2563eb" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="16" y1="25.5" x2="16" y2="23.5" stroke="#2563eb" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="6.5" y1="16" x2="8.5" y2="16" stroke="#2563eb" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Minute hand → 12 o'clock -->
  <line x1="16" y1="16" x2="16" y2="9" stroke="white" stroke-width="1.6" stroke-linecap="round"/>

  <!-- Hour hand → 9 o'clock -->
  <line x1="16" y1="16" x2="10" y2="16" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.8" fill="#2563eb"/>
</svg>
